<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Novatech</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#04142c] text-white min-h-screen flex flex-col justify-between font-sans">
    <div class="px-6 pt-16 flex flex-col items-start w-full max-w-md mx-auto">
        <div class="flex justify-between w-full items-start mb-12">
            <div>
                <p class="text-gray-400 text-lg">Iniciar sesión</p>
                <h1 class="text-3xl font-bold mt-1">Bienvenido a Novatech</h1>
            </div>
            <div class="w-16 h-16 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-xl flex items-center justify-center shadow-lg">
                <span class="text-2xl font-black italic text-white">N</span>
            </div>
        </div>

        <div class="w-full space-y-5">
            <div class="flex bg-white rounded-lg overflow-hidden border border-gray-300">
                <span class="bg-gray-100 text-gray-700 px-4 flex items-center font-semibold border-r border-gray-300">+1</span>
                <input id="phone" type="tel" placeholder="Introduce tu número de móvil" class="w-full px-4 py-3.5 text-gray-900 outline-none placeholder-gray-400 font-medium">
            </div>

            <input id="password" type="password" placeholder="Por favor, introduzca su contraseña" class="w-full bg-white text-gray-900 px-4 py-3.5 rounded-lg outline-none placeholder-gray-400 font-medium border border-gray-300">

            <div class="flex items-center space-x-2">
                <input id="remember" type="checkbox" class="w-4 h-4 rounded text-amber-500 accent-amber-500">
                <label for="remember" class="text-gray-400 text-sm select-none">Recuerda la contraseña</label>
            </div>

            <div class="pt-4 space-y-4">
                <button id="btnLogin" class="w-full bg-gradient-to-r from-amber-500 to-amber-600 font-bold py-3.5 rounded-lg shadow-lg active:scale-95 transition-all">
                    Inicia sesión ahora
                </button>
                <a href="registro.html" class="block w-full text-center bg-gradient-to-r from-amber-600/20 to-amber-700/20 border border-amber-500/30 text-amber-400 font-bold py-3.5 rounded-lg">
                    Crea una cuenta
                </a>
            </div>
        </div>
    </div>

    <div class="w-full opacity-20 pointer-events-none mt-12">
        <svg viewBox="0 0 1440 320" class="w-full h-auto"><path fill="#0070f3" d="M0,96L48,112C96,128,192,160,288,160C384,160,480,128,576,122.7C672,117,768,139,864,165.3C960,192,1056,224,1152,218.7C1248,213,1344,171,1392,150.7L1440,131L1440,320L0,320Z"></path></svg>
    </div>

    <script type="module">
        import { auth } from "./src/firebase-config.js";
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        document.getElementById('btnLogin').addEventListener('click', async () => {
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;

            if(!phone || !password) return alert('Completa todos los campos.');
            const fakeEmail = `${phone}@novatech.com`;

            try {
                await signInWithEmailAndPassword(auth, fakeEmail, password);
                window.location.href = "hogar.html";
            } catch (error) {
                alert("Número o contraseña incorrectos.");
            }
        });
    </script>
</body>
</html>
