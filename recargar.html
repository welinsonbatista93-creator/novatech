<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recargar - Novatech</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#030d1a] text-white font-sans min-h-screen pb-12">
    
    <!-- Encabezado con botón de retorno -->
    <div class="bg-black py-4 px-4 flex items-center justify-between border-b border-blue-900/20">
        <a href="hogar.html" class="text-white text-xl p-1 font-bold">❮</a>
        <h1 class="text-base font-bold tracking-wider">Depositar Fondos</h1>
        <div class="w-6"></div>
    </div>

    <div class="p-4 space-y-6 max-w-md mx-auto">
        
        <!-- Bloque de balance actual -->
        <div class="bg-gradient-to-r from-blue-950 to-slate-900 p-5 rounded-2xl border border-blue-900/20 shadow-md">
            <p id="currentBalance" class="text-2xl font-black text-amber-400">DOP 0.00</p>
            <p class="text-gray-400 text-xs mt-0.5">Saldo actual disponible</p>
        </div>

        <!-- Entrada del Monto de Recarga -->
        <div class="space-y-2">
            <label class="block text-sm font-bold text-gray-300">Monto de recarga</label>
            <div class="flex items-center border-b border-blue-900/40 py-2">
                <span class="text-lg font-bold pr-2 text-gray-400">DOP</span>
                <input id="depositAmount" type="number" placeholder="Ingrese el importe a depositar" class="bg-transparent w-full text-lg outline-none font-medium text-white placeholder-gray-500">
            </div>
        </div>

        <!-- Botones de selección rápida -->
        <div class="grid grid-cols-3 gap-3">
            <button onclick="setAmount(300)" class="bg-[#07172c] border border-blue-900/30 py-3 rounded-xl font-bold text-sm text-gray-200 active:scale-95 transition-all hover:border-amber-500">300</button>
            <button onclick="setAmount(600)" class="bg-[#07172c] border border-blue-900/30 py-3 rounded-xl font-bold text-sm text-gray-200 active:scale-95 transition-all hover:border-amber-500">600</button>
            <button onclick="setAmount(1200)" class="bg-[#07172c] border border-blue-900/30 py-3 rounded-xl font-bold text-sm text-gray-200 active:scale-95 transition-all hover:border-amber-500">1,200</button>
            <button onclick="setAmount(2500)" class="bg-[#07172c] border border-blue-900/30 py-3 rounded-xl font-bold text-sm text-gray-200 active:scale-95 transition-all hover:border-amber-500">2,500</button>
            <button onclick="setAmount(5000)" class="bg-[#07172c] border border-blue-900/30 py-3 rounded-xl font-bold text-sm text-gray-200 active:scale-95 transition-all hover:border-amber-500">5,000</button>
            <button onclick="setAmount(10000)" class="bg-[#07172c] border border-blue-900/30 py-3 rounded-xl font-bold text-sm text-gray-200 active:scale-95 transition-all hover:border-amber-500">10,000</button>
        </div>

        <!-- CUENTAS BANCARIAS REALES -->
        <div class="space-y-3">
            <label class="block text-sm font-bold text-amber-400">Selecciona un banco para transferir:</label>

            <!-- Banreservas -->
            <div class="bg-[#07172c] p-4 rounded-2xl border border-blue-900/30 space-y-2 shadow-lg">
                <div class="flex justify-between items-center border-b border-blue-900/20 pb-2">
                    <span class="text-sm font-bold text-white">Banreservas</span>
                    <span class="text-[10px] bg-green-500/20 text-green-400 px-2 py-0.5 rounded-full font-medium">Ahorros</span>
                </div>
                <div class="text-xs space-y-1 text-gray-300">
                    <p class="flex justify-between"><span>Número:</span> <span class="text-white font-mono font-bold select-all">9606810364</span></p>
                    <p class="flex justify-between"><span>Titular:</span> <span class="text-white">Welinson Batista Tejeda</span></p>
                </div>
            </div>

            <!-- Banco Popular -->
            <div class="bg-[#07172c] p-4 rounded-2xl border border-blue-900/30 space-y-2 shadow-lg">
                <div class="flex justify-between items-center border-b border-blue-900/20 pb-2">
                    <span class="text-sm font-bold text-white">Banco Popular</span>
                    <span class="text-[10px] bg-blue-500/20 text-blue-400 px-2 py-0.5 rounded-full font-medium">Corriente</span>
                </div>
                <div class="text-xs space-y-1 text-gray-300">
                    <p class="flex justify-between"><span>Número:</span> <span class="text-white font-mono font-bold select-all">809480569</span></p>
                    <p class="flex justify-between"><span>Titular:</span> <span class="text-white">Franklin Fernández</span></p>
                </div>
            </div>
        </div>

        <!-- Botón de acción para reportar la orden -->
        <div class="pt-2">
            <button id="btnSubmitDeposit" class="w-full bg-gradient-to-r from-amber-500 to-amber-600 text-white font-bold py-3.5 rounded-xl shadow-lg active:scale-95 transition-all text-sm">
                Confirmar y reportar depósito
            </button>
        </div>
    </div>

    <!-- Script de integración y base de datos -->
    <script type="module">
        import { auth, db } from "./src/firebase-config.js";
        import { doc, getDoc, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Función para los botones de selección rápida
        window.setAmount = function(value) {
            document.getElementById('depositAmount').value = value;
        }

        // Leer saldo actual en tiempo real
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if(userDoc.exists()){
                    const data = userDoc.data();
                    document.getElementById('currentBalance').innerText = `DOP ${parseFloat(data.balance || 0).toFixed(2)}`;
                }
            }
        });

        // Evento de envío de comprobante
        document.getElementById('btnSubmitDeposit').addEventListener('click', async () => {
            const amount = parseFloat(document.getElementById('depositAmount').value);

            if(isNaN(amount) || amount <= 0) {
                return alert("Por favor, ingrese un monto válido para depositar.");
            }

            try {
                // Registrar orden de depósito en Firebase para validación del administrador
                await addDoc(collection(db, "depositos"), {
                    userId: auth.currentUser.uid,
                    monto: amount,
                    status: "Pendiente",
                    timestamp: new Date().toLocaleString('es-DO')
                });

                // Enlace de redirección directa al soporte de WhatsApp
                window.open(`https://chat.whatsapp.com/IfgCgvipDkhK9lkXoq99wW`, '_blank');
                window.location.href = "hogar.html";
            } catch (e) { 
                alert("Error de conexión al procesar la solicitud de fondos."); 
            }
        });
    </script>
</body>
</html>
